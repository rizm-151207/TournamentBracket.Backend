groups:
  - name: api_alerts
    interval: 30s
    rules:
      - alert: HighErrorRate
        expr: |
          (
            sum(rate(http_server_request_duration_seconds_bucket{http_response_status_code=~"5.."}[5m]))
            /
            sum(rate(http_server_request_duration_seconds_bucket[5m]))
          ) * 100 > 10
        for: 5m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "Высокий уровень ошибок API"
          description: 'Уровень 5xx ошибок {{ $value | printf "%.2f" }}% превышает порог 10%'
          runbook_url: "https://wiki.example.com/runbooks/high-error-rate"

      - alert: HighLatency
        expr: |
          histogram_quantile(0.95,
            rate(http_server_request_duration_seconds_bucket[5m])
          ) > 1
        for: 10m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "Высокая задержка API"
          description: '95-й перцентиль latency {{ $value | printf "%.2f" }}s превышает 1с'

      - alert: ServiceDown
        expr: up{job="api"} == 0
        for: 1m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "Сервис API недоступен"
          description: "Prometheus не может скрейпить метрики с API более 1 минуты"
