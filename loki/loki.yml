auth_enabled: false

server:
  http_listen_port: 3100

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1

schema_config:
  configs:
    - from: 2026-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  retention_period: 744h

# НОВЫЕ СЕКЦИИ ДЛЯ ЗАМЕНЫ CONSUL:

# Настройка memberlist (общение между узлами)
memberlist:
  bind_port: 7946
  join_members:
    - loki # имя вашего контейнера Loki (из docker-compose)

# Настройка распределителя (distributor)
distributor:
  ring:
    kvstore:
      store: memberlist

# Настройка ingester
ingester:
  lifecycler:
    ring:
      kvstore:
        store: memberlist
      replication_factor: 1
