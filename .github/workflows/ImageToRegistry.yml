name: Build&Push Docker image to registry

on: workflow_dispatch

jobs:

  build:

    runs-on: ubuntu-latest
    

    steps:
    - uses: actions/checkout@v4
    
    - name: Log in to the Container registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }} # Uses the GitHub username of the workflow actor
        password: ${{ secrets.GITHUB_TOKEN }} # Uses the au

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
          
    - name: Build the Docker image
      run: docker build . --file Dockerfile --tag Tournament:$(date +%s)
