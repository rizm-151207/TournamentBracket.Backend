name: PR Checks

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint (pre-commit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js (for prettier)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up .NET (for dotnet-format)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install pre-commit and detect-secrets
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit detect-secrets

      - name: Run pre-commit hooks on all files
        run: python -m pre_commit run --all-files --show-diff-on-failure

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dotnet-version: ["6.0.x", "8.0.x"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{matrix.dotnet-version}}
          cache: true
          cache-dependency-path: "**/*.csproj"

      - name: Restore dependencies
        run: dotnet restore

      - name: Run tests
        run: dotnet test --no-restore --verbosity normal

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
          cache: true
          cache-dependency-path: "**/*.csproj"

      - name: Restore dependencies
        run: dotnet restore

      - name: Check for vulnerable packages
        run: dotnet list package --vulnerable --include-transitive

  security-sast:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: auto

  dependency-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check if pull request event
        id: check_pr
        run: |
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "Skipping dependency review because event is not pull_request"
            echo "skip=true" >> $GITHUB_OUTPUT
          fi

      - name: Dependency Review
        if: steps.check_pr.outputs.skip != 'true'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          vulnerability-check: true

  security-gate:
    runs-on: ubuntu-latest
    needs: [security-sast, dependency-check, security]

    steps:
      - name: Check security status
        run: |
          echo "Checking security status..."
          if [ "${{ needs.security-sast.result }}" = "failure" ] ||
          [ "${{ needs.dependency-check.result }}" = "failure" ||
          [ "${{ needs.security.result }}" = "failure" ]; then
            echo "❌ Critical vulnerabilities found!"
            exit 1
          fi
          echo "✅ Security checks passed!"
          
  build-image:
    runs-on: ubuntu-latest
    needs: [lint, test, security-gate]
    permissions:
      contents: read
      packages: write  
    steps:
      - uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          driver-opts: |
            image=moby/buildkit:latest

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}

      - name: Set lowercase repository name (для registry-кэша)
        run: echo "REPO_LOWER=${GITHUB_REPOSITORY@L}" >> $GITHUB_ENV

      - name: Build Docker image (without push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true   # загрузить образ в докердемон, чтобы потом сохранить в tar
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            DB_HOST=${{ vars.DB_HOST }}
            TOURNAMENT_DB_USER=${{ secrets.TOURNAMENT_DB_USER }}
            TOURNAMENT_DB_PASSWORD=${{ secrets.TOURNAMENT_DB_PASSWORD }}
          # cache-from: type=gha
          # cache-to: type=gha,mode=max
          
          cache-from: |
            type=gha
            type=registry,ref=ghcr.io/${{ env.REPO_LOWER }}:buildcache
          cache-to: |
            type=gha,mode=max
            type=registry,ref=ghcr.io/${{ env.REPO_LOWER }}:buildcache,mode=max

      - name: Save image as tar artifact
        run: |
          docker save -o image.tar ${{ steps.meta.outputs.tags }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar
          retention-days: 1

  push-image:
    runs-on: ubuntu-latest
    needs: build-image
    permissions:
      contents: read
      packages: write 

    steps:

      - name: Set lowercase repository name
        run: echo "REPO_LOWER=${GITHUB_REPOSITORY@L}" >> $GITHUB_ENV
        
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker image from tar
        run: docker load -i image.tar

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) again
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}

      - name: Push image to registry
        run: |
          for tag in ${{ steps.meta.outputs.tags }}; do
            echo "Pushing $tag"
            docker push "$tag"
          done

