openapi: 3.1.0
info:
  title: Auth api
  description: Api for user registration and auth tokens processing
  version: 0.0.1
paths:
  /api/auth/signup:
    post:
      summary: Register new user
      description: Register new user
      tags:
        - Auth
      operationId: signup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/registerUserCommand"
      responses:
        "201":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/registerSuccessResponse"
        "400":
          description: Error
          content:
            application/json:
              schema:
                $ref: "./Common.yaml#/components/schemas/error"
  /api/auth/login:
    post:
      summary: Login
      description: Return tokens by emal/password pair
      tags:
        - Auth
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/loginUserCommand"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/tokensResponse"
        "400":
          description: Error
          content:
            application/json:
              schema:
                $ref: "./Common.yaml#/components/schemas/error"
  /api/auth/logout:
    post:
      summary: Logout
      description: Log out signed-in user
      tags:
        - Auth
      operationId: logout
      security:
        - BearerAuth: []
      responses:
        "200":
          description: OK
        "401":
          description: Unauthorized or access token expired
        "400":
          description: Error
          content:
            application/json:
              schema:
                $ref: "./Common.yaml#/components/schemas/error"
  /api/auth/refreshToken:
    post:
      summary: Refresh access token
      description: Refresh access token by refresh token
      tags:
        - Auth
      operationId: refreshAccessToken
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/refreshTokenCommand"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/tokensResponse"
        "401":
          description: Unauthorized or access token expired
        "400":
          description: Error
          content:
            application/json:
              schema:
                $ref: "./Common.yaml#/components/schemas/error"
components:
  schemas:
    registerUserCommand:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
        role:
          type: string
          enum:
            - Administrator
            - Organizer
    registerSuccessResponse:
      type: object
      properties:
        email:
          type: string
    loginUserCommand:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
    refreshTokenCommand:
      type: object
      properties:
        refreshToken:
          type: string
      required:
        - refreshToken
    tokensResponse:
      type: object
      properties:
        refreshToken:
          type: string
