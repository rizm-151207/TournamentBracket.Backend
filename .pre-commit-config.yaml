repos:
  - repo: local
    hooks:
      - id: prettier
        name: prettier
        language: node
        entry: npx prettier --write
        files: \.(json|yaml|yml|md)$

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
        args: [--unsafe]
      - id: check-json

      - id: trailing-whitespace
      - id: check-added-large-files

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]

  - repo: local
    hooks:
      - id: dotnet-format
        name: dotnet-format
        language: system
        entry: dotnet format --include
        files: \.cs$
        args: ["--verify-no-changes", "--include-analyzers"]
